<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3단계 미션</title>
    <style>body { text-align: center; padding: 50px; } button { padding: 20px; font-size: 20px; }</style>
</head>
<body>
    <h1>3단계: 대상 + 사물 + 동작</h1>
    <button onclick="draw()">최종 미션 뽑기</button>
    <h2 id="res" style="color: purple; margin-top: 30px;"></h2>
    <br><a href="index.html">돌아가기</a>
    <script>
        const subs = ["옆 사람에게", "교수님 방향으로", "칠판에게"];
        const objs = ["윙크", "손가락 하트", "엄지 척"];
        const verbs = ["날리기", "보여주기", "시전하기"];
        function draw() {
            const s = subs[Math.floor(Math.random()*subs.length)];
            const o = objs[Math.floor(Math.random()*objs.length)];
            const v = verbs[Math.floor(Math.random()*verbs.length)];
            document.getElementById('res').innerText = `${s} ${o}를 ${v}`;
        }
    </script>
</body>
</html>
