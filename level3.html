<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3단계 미션</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #87ceeb;
            --ground-green: #7cfc00;
            --pixel-yellow: #ffd300;
            --pixel-green: #2ed573;
            --pixel-purple: #9b59b6;
        }

        body {
            font-family: 'Press Start 2P', cursive; text-align: center; margin: 0; padding: 0; height: 100vh; color: #000;
            background: linear-gradient(to bottom, transparent 70%, var(--ground-green) 70%), linear-gradient(to bottom, var(--sky-blue) 0%, #fff 70%);
            display: flex; flex-direction: column; align-items: center; position: relative; overflow: hidden;
        }

        .bgm-btn { position: absolute; top: 20px; right: 20px; background: #fff; border: 4px solid #000; padding: 10px; font-family: 'Press Start 2P', cursive; font-size: 10px; cursor: pointer; box-shadow: 4px 4px 0px #000; z-index: 20; }
        .bgm-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        .cheerleader { position: absolute; bottom: 30%; width: 40px; height: 60px; background: #f0d5b1; border: 4px solid #000; image-rendering: pixelated; }
        .cheerleader::after { content: ''; position: absolute; top: 20px; left: -4px; width: 40px; height: 30px; background: var(--pixel-yellow); border: 4px solid #000; }
        .pompom { position: absolute; top: -20px; width: 20px; height: 20px; background: var(--pixel-purple); border: 4px solid #000; animation: shake 0.5s infinite alternate; }
        .pompom.left { left: -25px; } .pompom.right { right: -25px; animation-delay: 0.2s; }
        @keyframes shake { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
        .pos-left { left: 10%; } .pos-right { right: 10%; transform: scaleX(-1); }

        .game-container { margin-top: 50px; z-index: 10; background: rgba(255, 255, 255, 0.9); padding: 30px; border: 4px solid #000; box-shadow: 8px 8px 0px rgba(0,0,0,0.2); width: 80%; max-width: 600px; }
        h1 { font-size: 18px; margin-bottom: 10px; color: #f39c12; text-shadow: 2px 2px 0 #000; }
        p.desc { font-size: 8px; color: #555; margin-bottom: 30px; line-height: 1.5; }
        button { padding: 15px 20px; font-family: 'Press Start 2P', cursive; font-size: 10px; margin: 10px; cursor: pointer; border: 4px solid #000; transition: all 0.1s; }
        
        .btn-draw { background-color: var(--pixel-yellow); color: #000; box-shadow: 4px 4px 0px #000; }
        .btn-success { background-color: var(--pixel-green); color: white; box-shadow: 4px 4px 0px #000; }
        .btn-toggle { background-color: #333; color: white; box-shadow: 4px 4px 0px #000; margin-top: 20px;}
        button:disabled { background-color: #ccc; box-shadow: 2px 2px 0px #000; cursor: not-allowed; color: #888; }
        button:active:not(:disabled) { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }

        #timer { font-size: 30px; margin: 30px 0; color: #000; text-shadow: 2px 2px 0px #fff; }
        #res { margin-top: 10px; font-size: 16px; min-height: 40px; line-height: 1.5; word-break: keep-all; font-family: 'Malgun Gothic', sans-serif; font-weight: bold; transition: opacity 0.2s; }
        .btn-back { display: inline-block; margin-top: 40px; font-size: 10px; color: #333; text-decoration: none; border-bottom: 2px solid #333; }
    </style>
</head>
<body>
    <audio id="bgm" src="https://ia800504.us.archive.org/33/items/TetrisThemeMusic/Tetris.mp3" loop></audio>
    <button id="bgm-btn" class="bgm-btn" onclick="toggleBgm()">🎵 BGM 재생</button>

    <div class="cheerleader pos-left"><div class="pompom left"></div><div class="pompom right"></div></div>
    <div class="cheerleader pos-right"><div class="pompom left"></div><div class="pompom right"></div></div>

    <div class="game-container">
        <h1 style="color:var(--pixel-yellow);">LEVEL 3</h1>
        <p class="desc">정답 버튼을 누르면 시간이 멈춥니다!</p>
        
        <div>
            <button class="btn-draw" onclick="draw()">3단계 미션 뽑기</button>
            <button class="btn-success" id="btn-success" onclick="stopTimer()" disabled>성공!</button>
        </div>
        
        <div id="timer">0.00s</div>
        <h2 id="res"></h2>
        
        <button class="btn-toggle" id="btn-toggle" onclick="toggleText()" disabled>👁️ 제시어 가리기</button>
        <br><a href="index.html" class="btn-back">🔙 로비로 돌아가기</a>
    </div>

    <script>
        const subs = ["발표자에게", "교수님에게", "이전 발표자에게", "자기 옆자리,없을경우 앞 또는 뒷자리 사람에게", "우리반 반장에게"];
        const objs = ["악수", "90도로 고개숙여 인사", "하이파이브", "손가락 하트", "따봉","손을 흔들며 인사"];
        const verbs = ["하기"];
        let timerInterval = null;
        let startTime = 0;
        let isTextHidden = false;

        const bgm = document.getElementById('bgm');
        bgm.volume = 0.3;

        function toggleBgm() {
            if (bgm.paused) { bgm.play(); document.getElementById('bgm-btn').innerText = "🔇 BGM 정지"; } 
            else { bgm.pause(); document.getElementById('bgm-btn').innerText = "🎵 BGM 재생"; }
        }

        function draw() {
            const s = subs[Math.floor(Math.random() * subs.length)];
            const o = objs[Math.floor(Math.random() * objs.length)];
            const v = verbs[Math.floor(Math.random() * verbs.length)];
            document.getElementById('res').innerText = `${s} ${o} ${v}`;
            
            isTextHidden = false;
            document.getElementById('res').style.opacity = "1";
            document.getElementById('btn-toggle').innerText = "👁️ 제시어 가리기";
            document.getElementById('btn-toggle').disabled = false;

            clearInterval(timerInterval);
            document.getElementById('timer').style.color = "#000";
            document.getElementById('res').style.color = "#000";
            document.getElementById('btn-success').disabled = false;
            
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsedTime = ((Date.now() - startTime) / 1000).toFixed(2);
                document.getElementById('timer').innerText = elapsedTime + "s";
            }, 10);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('timer').style.color = "var(--pixel-green)";
                document.getElementById('res').style.color = "var(--pixel-green)";
                document.getElementById('btn-success').disabled = true;
            }
        }

        function toggleText() {
            const resObj = document.getElementById('res');
            const toggleBtn = document.getElementById('btn-toggle');
            isTextHidden = !isTextHidden;
            if (isTextHidden) {
                resObj.style.opacity = "0";
                toggleBtn.innerText = "👀 제시어 보이기";
            } else {
                resObj.style.opacity = "1";
                toggleBtn.innerText = "👁️ 제시어 가리기";
            }
        }
    </script>
</body>
</html>
