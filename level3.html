<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3단계 미션</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #fafafa; }
        button { padding: 15px 25px; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .btn-draw { background: #008CBA; color: white; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-success:disabled { background: #ccc; cursor: not-allowed; }
        .btn-back { display: inline-block; margin-top: 30px; color: #555; text-decoration: none; }
        #timer { font-size: 45px; font-weight: bold; color: #333; margin: 20px 0; }
        #res { color: #9b59b6; margin-top: 20px; font-size: 28px; min-height: 40px; }
    </style>
</head>
<body>
    <h1>3단계: 대상 + 사물 + 동작</h1>
    <div>
        <button class="btn-draw" onclick="draw()">3단계 동작 뽑기</button>
        <button class="btn-success" id="btn-success" onclick="stopTimer()" disabled>정답!</button>
    </div>
    
    <div id="timer">0.00초</div>
    <h2 id="res"></h2>
    
    <br><a href="index.html" class="btn-back">← 난이도 선택으로 돌아가기</a>

    <script>
        const subs = ["옆 사람에게", "교수님 방향으로", "칠판을 향해", "앞 사람에게"];
        const objs = ["윙크", "손가락 하트", "소리 없는 따봉", "메모지"];
        const verbs = ["날리기", "보여주기", "시전하기", "슬쩍 건네기"];
        let timerInterval = null;
        let startTime = 0;

        function draw() {
            // 주어 1개, 목적어 1개, 동사 1개 무작위 조합
            const s = subs[Math.floor(Math.random() * subs.length)];
            const o = objs[Math.floor(Math.random() * objs.length)];
            const v = verbs[Math.floor(Math.random() * verbs.length)];
            document.getElementById('res').innerText = `${s} ${o}를(을) ${v}`;
            
            // 타이머 초기화 및 재시작
            clearInterval(timerInterval);
            document.getElementById('timer').style.color = "#333";
            document.getElementById('btn-success').disabled = false;
            
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsedTime = ((Date.now() - startTime) / 1000).toFixed(2);
                document.getElementById('timer').innerText = elapsedTime + "초";
            }, 10);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('timer').style.color = "#2ecc71";
                document.getElementById('btn-success').disabled = true;
            }
        }
    </script>
</body>
</html>
