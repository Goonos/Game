<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>2단계 미션</title>
    <style>body { text-align: center; padding: 50px; } button { padding: 20px; font-size: 20px; }</style>
</head>
<body>
    <h1>2단계: 사물 + 동작</h1>
    <button onclick="draw()">미션 뽑기</button>
    <h2 id="res" style="color: blue; margin-top: 30px;"></h2>
    <br><a href="index.html">돌아가기</a>
    <script>
        const objs = ["볼펜", "지우개", "책", "텀블러"];
        const verbs = ["머리 위에 올리기", "손가락으로 돌리기", "쓰다듬기"];
        function draw() {
            const o = objs[Math.floor(Math.random()*objs.length)];
            const v = verbs[Math.floor(Math.random()*verbs.length)];
            document.getElementById('res').innerText = `${o}을(를) ${v}`;
        }
    </script>
</body>
</html>
