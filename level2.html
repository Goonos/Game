<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3단계 미션</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #87ceeb;
            --ground-green: #7cfc00;
            --pixel-yellow: #ffd300;
            --pixel-green: #2ed573;
            --pixel-purple: #9b59b6;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            color: #000;
            background: 
                linear-gradient(to bottom, transparent 70%, var(--ground-green) 70%),
                linear-gradient(to bottom, var(--sky-blue) 0%, #fff 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .cheerleader {
            position: absolute;
            bottom: 30%;
            width: 40px;
            height: 60px;
            background: #f0d5b1;
            border: 4px solid #000;
            image-rendering: pixelated;
        }
        .cheerleader::after {
            content: '';
            position: absolute;
            top: 20px; left: -4px;
            width: 40px; height: 30px;
            background: var(--pixel-yellow);
            border: 4px solid #000;
        }
        .pompom {
            position: absolute;
            top: -20px;
            width: 20px; height: 20px;
            background: var(--pixel-purple);
            border: 4px solid #000;
            animation: shake 0.5s infinite alternate;
        }
        .pompom.left { left: -25px; }
        .pompom.right { right: -25px; animation-delay: 0.2s; }
        @keyframes shake {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }
        .pos-left { left: 10%; }
        .pos-right { right: 10%; transform: scaleX(-1); }

        .game-container {
            margin-top: 50px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border: 4px solid #000;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            width: 80%;
            max-width: 600px;
        }

        h1 { font-size: 18px; margin-bottom: 10px; color: #f39c12; text-shadow: 2px 2px 0 #000;}
        p.desc { font-size: 8px; color: #555; margin-bottom: 30px; line-height: 1.5; }

        button {
            padding: 15px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            margin: 10px;
            cursor: pointer;
            border: 4px solid #000;
            transition: all 0.1s;
        }

        .btn-draw { background-color: var(--pixel-yellow); color: #000; box-shadow: 4px 4px 0px #000; }
        .btn-success { background-color: var(--pixel-green); color: white; box-shadow: 4px 4px 0px #000; }
