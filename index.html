<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의실 비밀 미션 게임</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 50px 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .hidden {
            display: none;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: 0.2s;
        }
        .btn-level {
            background-color: #4CAF50;
            color: white;
            width: 80%;
        }
        .btn-level:hover { background-color: #45a049; }
        .btn-draw {
            background-color: #008CBA;
            color: white;
            font-size: 18px;
            padding: 15px 30px;
        }
        .btn-draw:hover { background-color: #007399; }
        .btn-back {
            background-color: #f44336;
            color: white;
        }
        .btn-back:hover { background-color: #da190b; }
        #result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #ffffe0;
            border-radius: 10px;
            border: 2px dashed #f39c12;
            min-height: 50px;
        }
        #result-text {
            font-size: 22px;
            font-weight: bold;
            color: #d35400;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🤫 강의실 비밀 미션</h1>
    
    <div id="screen-difficulty">
        <p>지금 강의실인가요? 원하는 난이도를 선택하세요!</p>
        <button class="btn-level" onclick="selectLevel(1)">1단계 (단순 행동)</button><br>
        <button class="btn-level" onclick="selectLevel(2)">2단계 (사물 활용)</button><br>
        <button class="btn-level" onclick="selectLevel(3)">3단계 (대상 지정)</button>
    </div>

    <div id="screen-game" class="hidden">
        <h2 id="current-level-title"></h2>
        <button class="btn-draw" id="btn-draw" onclick="drawMission()">동작 뽑기</button>
        
        <div id="result-box" class="hidden">
            <span id="result-text"></span>
        </div>

        <br><br>
        <button class="btn-back" onclick="goBack()">난이도 다시 선택</button>
    </div>
</div>
