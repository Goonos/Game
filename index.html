<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미니게임 랜드</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0c1e;
            --pixel-pink: #ff6ac1;
            --pixel-blue: #5ce1ff;
            --pixel-yellow: #ffd300;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            color: white;
            background: 
                linear-gradient(to bottom, transparent 80%, #1a1a2e 80%),
                linear-gradient(45deg, #2a2a4a 25%, transparent 25%) 50px -50px,
                linear-gradient(-45deg, #2a2a4a 25%, transparent 25%) 50px -50px,
                linear-gradient(45deg, transparent 75%, #2a2a4a 75%),
                linear-gradient(-45deg, transparent 75%, #2a2a4a 75%),
                radial-gradient(circle at 20% 20%, #3a3a5a 1px, transparent 1px),
                radial-gradient(circle at 80% 40%, #fff 1px, transparent 1px),
                var(--bg-color);
            background-size: 100% 100%, 100px 100px, 100px 100px, 100px 100px, 100px 100px, 30px 30px, 50px 50px, 100% 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 배경음악 버튼 스타일 */
        .bgm-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #fff;
            border: 4px solid #000;
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
        }
        .bgm-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        h1 {
            font-size: 24px;
            text-shadow: 4px 4px 0px #000;
            margin-bottom: 50px;
            color: var(--pixel-yellow);
        }

        .menu { display: flex; flex-direction: column; gap: 25px; }

        a {
            text-decoration: none;
            color: #000;
            padding: 20px 40px;
            width: 280px;
            font-size: 14px;
            display: inline-block;
            transition: all 0.1s;
            background-color: #fff;
            border: 4px solid #000;
            box-shadow: 6px 6px 0px #000;
        }
        .btn-1 { background-color: var(--pixel-blue); }
        .btn-2 { background-color: var(--pixel-pink); }
        .btn-3 { background-color: var(--pixel-yellow); }
        a:hover { transform: translate(2px, 2px); box-shadow: 4px 4px 0px #000; }
        a:active { transform: translate(6px, 6px); box-shadow: 0px 0px 0px #000; }
    </style>
</head>
<body>
    <audio id="bgm" src="https://ia800504.us.archive.org/33/items/TetrisThemeMusic/Tetris.mp3" loop></audio>
    <button id="bgm-btn" class="bgm-btn" onclick="toggleBgm()">🎵 BGM 재생</button>

    <h1>🏰미니게임 랜드🎡<br><span style="font-size: 12px; color: #fff;">난이도 선택</span></h1>
    <div class="menu">
        <a href="level1.html" class="btn-1">LEVEL 1<br><span style="font-size: 8px;">(EASY)</span></a>
        <a href="level2.html" class="btn-2">LEVEL 2<br><span style="font-size: 8px;">(NORMAL)</span></a>
        <a href="level3.html" class="btn-3">LEVEL 3<br><span style="font-size: 8px;">(HARD)</span></a>
    </div>

    <script>
        const bgm = document.getElementById('bgm');
        const bgmBtn = document.getElementById('bgm-btn');
        // 오디오 볼륨을 살짝 줄임 (0.3 = 30%)
        bgm.volume = 0.3;

        function toggleBgm() {
            if (bgm.paused) {
                bgm.play();
                bgmBtn.innerText = "🔇 BGM 정지";
            } else {
                bgm.pause();
                bgmBtn.innerText = "🎵 BGM 재생";
            }
        }
    </script>
</body>
</html>
