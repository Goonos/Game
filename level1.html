<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>1단계 미션</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #fafafa; }
        button { padding: 15px 25px; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .btn-draw { background: #008CBA; color: white; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-success:disabled { background: #ccc; cursor: not-allowed; }
        .btn-back { display: inline-block; margin-top: 30px; color: #555; text-decoration: none; }
        #timer { font-size: 45px; font-weight: bold; color: #333; margin: 20px 0; }
        #res { color: #e74c3c; margin-top: 20px; font-size: 28px; min-height: 40px; }
    </style>
</head>
<body>
    <h1>1단계: 혼자 하는 동작</h1>
    <div>
        <button class="btn-draw" onclick="draw()">1단계 동작 뽑기</button>
        <button class="btn-success" id="btn-success" onclick="stopTimer()" disabled>정답!</button>
    </div>
    
    <div id="timer">0.00초</div>
    <h2 id="res"></h2>
    
    <br><a href="index.html" class="btn-back">← 난이도 선택으로 돌아가기</a>

    <script>
        const v = ["신발 벗기", "바닥 눕기", "의자에서 기지개 켜기", "눈 감고 10초 명상하기"];
        let timerInterval = null;
        let startTime = 0;

        function draw() {
            // 1. 미션 무작위 뽑기
            document.getElementById('res').innerText = v[Math.floor(Math.random() * v.length)];
            
            // 2. 타이머 초기화 및 재시작
            clearInterval(timerInterval);
            document.getElementById('timer').style.color = "#333"; // 글자 색상 초기화
            document.getElementById('btn-success').disabled = false; // 정답 버튼 활성화
            
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsedTime = ((Date.now() - startTime) / 1000).toFixed(2);
                document.getElementById('timer').innerText = elapsedTime + "초";
            }, 10); // 0.01초 단위로 업데이트
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('timer').style.color = "#2ecc71"; // 성공 시 타이머 녹색 변경
                document.getElementById('btn-success').disabled = true; // 정답 버튼 비활성화
            }
        }
    </script>
</body>
</html>
