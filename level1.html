<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>1단계 미션</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #87ceeb;
            --ground-green: #7cfc00;
            --pixel-red: #ff4757;
            --pixel-green: #2ed573;
            --pixel-blue: #1e90ff;
            --pixel-yellow: #ffd300;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            color: #000;
            background: 
                linear-gradient(to bottom, transparent 70%, var(--ground-green) 70%),
                linear-gradient(to bottom, var(--sky-blue) 0%, #fff 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .cheerleader {
            position: absolute;
            bottom: 30%;
            width: 40px;
            height: 60px;
            background: #f0d5b1;
            border: 4px solid #000;
            image-rendering: pixelated;
        }
        .cheerleader::after {
            content: '';
            position: absolute;
            top: 20px; left: -4px;
            width: 40px; height: 30px;
            background: var(--pixel-red);
            border: 4px solid #000;
        }
        .pompom {
            position: absolute;
            top: -20px;
            width: 20px; height: 20px;
            background: var(--pixel-yellow);
            border: 4px solid #000;
            animation: shake 0.5s infinite alternate;
        }
        .pompom.left { left: -25px; }
        .pompom.right { right: -25px; animation-delay: 0.2s; }
        @keyframes shake {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }
        .pos-left { left: 10%; }
        .pos-right { right: 10%; transform: scaleX(-1); }

        .game-container {
            margin-top: 50px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border: 4px solid #000;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            width: 80%;
            max-width: 600px;
        }

        h1 { font-size: 18px; margin-bottom: 10px; color: var(--pixel-blue); }
        p.desc { font-size: 8px; color: #555; margin-bottom: 30px; line-height: 1.5; }

        button {
            padding: 15px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            margin: 10px;
            cursor: pointer;
            border: 4px solid #000;
            transition: all 0.1s;
        }

        .btn-draw { background-color: var(--pixel-blue); color: white; box-shadow: 4px 4px 0px #000; }
        .btn-success { background-color: var(--pixel-green); color: white; box-shadow: 4px 4px 0px #000; }
        .btn-success:disabled { background-color: #ccc; box-shadow: 2px 2px 0px #000; cursor: not-allowed; color: #888; }
        button:active:not(:disabled) { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }

        #timer { font-size: 30px; margin: 30px 0; color: #000; text-shadow: 2px 2px 0px #fff; }
        #res { margin-top: 20px; font-size: 14px; min-height: 40px; line-height: 1.5; word-break: keep-all; font-family: 'Malgun Gothic', sans-serif; font-weight: bold; }
        .btn-back { display: inline-block; margin-top: 40px; font-size: 10px; color: #333; text-decoration: none; border-bottom: 2px solid #333; }
    </style>
</head>
<body>
    <div class="cheerleader pos-left">
        <div class="pompom left"></div>
        <div class="pompom right"></div>
    </div>
    <div class="cheerleader pos-right">
        <div class="pompom left"></div>
        <div class="pompom right"></div>
    </div>

    <div class="game-container">
        <h1>LEVEL 1</h1>
        <p class="desc">정답 버튼을 누르면 시간이 멈춥니다!</p>
        
        <div>
            <button class="btn-draw" onclick="draw()">1단계 미션 뽑기</button>
            <button class="btn-success" id="btn-success" onclick="stopTimer()" disabled>성공!</button>
        </div>
        
        <div id="timer">0.00s</div>
        <h2 id="res"></h2>
        
        <a href="index.html" class="btn-back">🔙 로비로 돌아가기</a>
    </div>

    <script>
        const v = ["신발 조용히 벗기", "바닥에 눕기", "의자에서 기지개 켜기", "눈 감고 10초 명상하기", "허공에 주먹질하기", "소리 없이 박수 한 번 치기"];
        let timerInterval = null;
        let startTime = 0;

        function draw() {
            document.getElementById('res').innerText = v[Math.floor(Math.random() * v.length)];
            document.getElementById('res').style.color = "#000";

            clearInterval(timerInterval);
            document.getElementById('timer').style.color = "#000";
            document.getElementById('btn-success').disabled = false;
            
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsedTime = ((Date.now() - startTime) / 1000).toFixed(2);
                document.getElementById('timer').innerText = elapsedTime + "s";
            }, 10);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('timer').style.color = "var(--pixel-green)";
                document.getElementById('res').style.color = "var(--pixel-green)";
                document.getElementById('btn-success').disabled = true;
            }
        }
    </script>
</body>
</html>
