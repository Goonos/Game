<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1단계 미션</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #f4f4f9; margin: 0; padding: 50px 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        .hidden { display: none; }
        button { padding: 12px 20px; font-size: 16px; font-weight: bold; margin: 10px; cursor: pointer; border: none; border-radius: 8px; transition: 0.2s; }
        .btn-draw { background-color: #008CBA; color: white; font-size: 18px; padding: 15px 30px; }
        .btn-draw:hover { background-color: #007399; }
        .btn-back { background-color: #f44336; color: white; }
        .btn-back:hover { background-color: #da190b; }
        #result-box { margin-top: 30px; padding: 20px; background-color: #ffffe0; border-radius: 10px; border: 2px dashed #f39c12; min-height: 50px; }
        #result-text { font-size: 22px; font-weight: bold; color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <h2>1단계 미션</h2>
        <button class="btn-draw" onclick="drawMission()">1단계 동작 뽑기</button>
        
        <div id="result-box" class="hidden">
            <span id="result-text"></span>
        </div>

        <br><br>
        <button class="btn-back" onclick="location.href='index.html'">난이도 다시 선택</button>
    </div>

    <script>
        const verbs = ["신발 조용히 벗기", "바닥에 눕기", "의자에서 기지개 켜기", "눈 감고 10초 명상하기", "허공에 주먹질하기", "소리 없이 박수 한 번 치기"];

        function drawMission() {
            const randomVerb = verbs[Math.floor(Math.random() * verbs.length)];
            
            document.getElementById('result-box').classList.remove('hidden');
            document.getElementById('result-text').innerText = randomVerb;
        }
    </script>
</body>
</html>
