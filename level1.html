<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>1단계 미션</title>
    <style>body { text-align: center; padding: 50px; } button { padding: 20px; font-size: 20px; }</style>
</head>
<body>
    <h1>1단계: 혼자 하는 동작</h1>
    <button onclick="draw()">동작 뽑기</button>
    <h2 id="res" style="color: red; margin-top: 30px;"></h2>
    <br><a href="index.html">돌아가기</a>
    <script>
        const v = ["신발 벗기", "바닥 눕기", "기지개 켜기", "눈 감고 10초 명상"];
        function draw() {
            document.getElementById('res').innerText = v[Math.floor(Math.random()*v.length)];
        }
    </script>
</body>
</html>
